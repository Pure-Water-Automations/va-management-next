<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VA World</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0f1115;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
      /* React A/V overlay sits above the Phaser canvas; only controls capture input. */
      #ui {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
      .vw-hud {
        position: absolute;
        right: 12px;
        bottom: 12px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }
      .vw-tiles {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
        max-width: 60vw;
      }
      .vw-tile {
        position: relative;
        width: 160px;
        height: 120px;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      }
      .vw-tile video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .vw-tile-name {
        position: absolute;
        left: 6px;
        bottom: 4px;
        font-size: 12px;
        color: #e6f1ff;
        text-shadow: 0 1px 2px #000;
      }
      .vw-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        pointer-events: auto;
      }
      .vw-zone {
        font-size: 12px;
        color: #e6f1ff;
        background: rgba(15, 17, 21, 0.7);
        padding: 6px 10px;
        border-radius: 8px;
      }
      .vw-controls button {
        pointer-events: auto;
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
        background: #262c40;
        color: #e6f1ff;
      }
      .vw-controls button.on {
        background: #2dd4bf;
        color: #0f1115;
      }
      .vw-controls button:disabled {
        opacity: 0.5;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/ui/main.tsx"></script>
  </body>
</html>
