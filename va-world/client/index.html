<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VA World</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0f1115;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
      /* React A/V overlay sits above the Phaser canvas; only controls capture input. */
      #ui {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
      .vw-hud {
        position: absolute;
        right: 12px;
        bottom: 12px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }
      .vw-tiles {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
        max-width: 60vw;
      }
      .vw-tile {
        position: relative;
        width: 160px;
        height: 120px;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      }
      .vw-tile video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .vw-tile-name {
        position: absolute;
        left: 6px;
        bottom: 4px;
        font-size: 12px;
        color: #e6f1ff;
        text-shadow: 0 1px 2px #000;
      }
      .vw-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        pointer-events: auto;
      }
      .vw-zone {
        font-size: 12px;
        color: #e6f1ff;
        background: rgba(15, 17, 21, 0.7);
        padding: 6px 10px;
        border-radius: 8px;
      }
      .vw-controls button {
        pointer-events: auto;
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
        background: #262c40;
        color: #e6f1ff;
      }
      .vw-controls button.on {
        background: #2dd4bf;
        color: #0f1115;
      }
      .vw-controls button:disabled {
        opacity: 0.5;
        cursor: default;
      }

      /* Top bar: directory + avatar picker */
      .vw-topbar {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }
      .vw-dir,
      .vw-avatar {
        pointer-events: auto;
        background: rgba(15, 17, 21, 0.8);
        border-radius: 8px;
        color: #e6f1ff;
        font-size: 13px;
      }
      .vw-dir-toggle {
        pointer-events: auto;
        border: 0;
        border-radius: 8px;
        background: #262c40;
        color: #e6f1ff;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
      }
      .vw-dir-list {
        margin-top: 4px;
        padding: 6px;
        max-height: 50vh;
        overflow-y: auto;
        min-width: 220px;
      }
      .vw-dir-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 2px;
      }
      .vw-dir-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex: 0 0 auto;
      }
      .vw-dir-name {
        flex: 1 1 auto;
      }
      .vw-dir-tier {
        color: #9aa3b2;
        font-size: 11px;
      }
      .vw-dir-go {
        pointer-events: auto;
        border: 0;
        border-radius: 6px;
        background: #2dd4bf;
        color: #0f1115;
        padding: 2px 8px;
        font-size: 11px;
        cursor: pointer;
      }
      .vw-dir-empty {
        color: #9aa3b2;
        padding: 4px;
      }
      .vw-avatar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 10px;
      }
      .vw-avatar-label {
        color: #9aa3b2;
        font-size: 12px;
      }
      .vw-swatch {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        pointer-events: auto;
      }
      .vw-swatch.on {
        border-color: #e6f1ff;
      }

      /* Chat: bottom-left */
      .vw-chat {
        position: absolute;
        left: 12px;
        bottom: 12px;
        width: 280px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        pointer-events: none;
      }
      .vw-chat-log {
        max-height: 30vh;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .vw-chat-line {
        background: rgba(15, 17, 21, 0.7);
        color: #e6f1ff;
        font-size: 13px;
        padding: 3px 6px;
        border-radius: 6px;
        align-self: flex-start;
        max-width: 100%;
        word-break: break-word;
      }
      .vw-chat-from {
        color: #2dd4bf;
        font-weight: 600;
      }
      .vw-chat-input {
        pointer-events: auto;
        border: 0;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
        background: #262c40;
        color: #e6f1ff;
      }

      /* Guide: right-docked instructions panel (fills the empty gutter) */
      .vw-help {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 320px;
        max-width: calc(100vw - 24px);
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        pointer-events: none;
      }
      .vw-help-card {
        pointer-events: auto;
        width: 100%;
        max-height: 82vh;
        overflow-y: auto;
        background: rgba(15, 17, 21, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        color: #c7d0de;
        padding: 12px 14px 14px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
      }
      .vw-help-h {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
        color: #e6f1ff;
      }
      .vw-help-card h4 {
        margin: 12px 0 3px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #2dd4bf;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .vw-help-card p {
        margin: 0 0 6px;
        font-size: 12.5px;
        line-height: 1.45;
      }
      .vw-help-card strong {
        color: #e6f1ff;
      }
      .vw-help kbd {
        display: inline-block;
        background: #262c40;
        border-radius: 4px;
        padding: 1px 6px;
        margin-right: 2px;
        font-size: 11px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #e6f1ff;
      }
      .vw-help-zone {
        width: 10px;
        height: 10px;
        border-radius: 3px;
        flex: 0 0 auto;
      }
      .vw-help-toggle {
        pointer-events: auto;
        border: 0;
        border-radius: 8px;
        background: #262c40;
        color: #e6f1ff;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/ui/main.tsx"></script>
  </body>
</html>
