<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure Water Automations — Operations Support for Ministry Leaders</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html,body{margin:0;padding:0;overflow-x:hidden;}
    body{background:#fff;-webkit-font-smoothing:antialiased;}
    *{box-sizing:border-box;} a{text-decoration:none;cursor:pointer;}
    @keyframes pwa-spin{to{transform:rotate(360deg);}}
    @keyframes pwa-fade-up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pwa-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
    @keyframes pwa-pulse-glow{0%,100%{box-shadow:0 0 0 0 rgba(77,196,232,.4);}50%{box-shadow:0 0 0 8px rgba(77,196,232,0);}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

/* ── Inline Components ─────────────────────────────────── */

function Btn({v='primary',sz='md',disabled=false,icon,iconRight,onClick,type='button',href,children,style={},...r}) {
  const S={sm:{h:'34px',p:'0 16px',fs:'13px',g:'6px'},md:{h:'42px',p:'0 20px',fs:'15px',g:'8px'},lg:{h:'52px',p:'0 28px',fs:'17px',g:'10px'},xl:{h:'62px',p:'0 40px',fs:'19px',g:'12px'}}[sz]||{};
  const V={primary:{background:'linear-gradient(180deg,#1a278a,#132272)',color:'#fff',border:'1px solid rgba(255,255,255,.08)',boxShadow:'0 4px 12px rgba(19,34,114,.2)'},secondary:{background:'linear-gradient(180deg,#4dc4e8,#2ab0d8)',color:'#fff',border:'1px solid rgba(255,255,255,.15)',boxShadow:'0 4px 12px rgba(77,196,232,.25)'},ghost:{background:'transparent',color:'#132272',border:'1px solid #d2d2d7',boxShadow:'0 1px 2px rgba(0,0,0,.04)'},text:{background:'transparent',color:'#1a278a',border:'none',boxShadow:'none'}}[v]||{};
  const hoverShadow={primary:'0 8px 24px rgba(19,34,114,.24)',secondary:'0 8px 24px rgba(77,196,232,.3)',ghost:'0 1px 3px rgba(0,0,0,.08)',text:'none'}[v]||'';
  const base={display:'inline-flex',alignItems:'center',justifyContent:'center',gap:S.g,borderRadius:'9999px',fontFamily:'DM Sans,system-ui,sans-serif',fontWeight:500,letterSpacing:'-.01em',cursor:'pointer',outline:'none',whiteSpace:'nowrap',userSelect:'none',transition:'transform .24s cubic-bezier(.34,1.56,.64,1),box-shadow .24s ease',height:S.h,padding:S.p,fontSize:S.fs,flexShrink:0,...V,...style};
  const hE=e=>{e.currentTarget.style.transform='translateY(-1px) scale(1.015)';e.currentTarget.style.boxShadow=hoverShadow;};
  const hL=e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=V.boxShadow||'';};
  const hD=e=>{e.currentTarget.style.transform='scale(.97)';};
  const inner=<>{icon?<span style={{display:'flex'}}>{icon}</span>:null}{children}{iconRight&&<span style={{display:'flex'}}>{iconRight}</span>}</>;
  if(href)return<a href={href} style={base} onMouseEnter={hE} onMouseLeave={hL} onMouseDown={hD} {...r}>{inner}</a>;
  return<button type={type} onClick={onClick} style={base} onMouseEnter={hE} onMouseLeave={hL} onMouseDown={hD} {...r}>{inner}</button>;
}

function Crd({variant='default',padding=32,radius=24,hoverable,onClick,children,style={},...r}) {
  const V={default:{background:'#fff',border:'1px solid #d2d2d7',boxShadow:'0 1px 3px rgba(0,0,0,.08)'},elevated:{background:'#fff',border:'none',boxShadow:'0 8px 24px rgba(0,0,0,.1)'}}[variant]||{};
  const base={borderRadius:radius,padding,transition:'transform .24s cubic-bezier(.34,1.56,.64,1),box-shadow .24s ease',cursor:onClick||hoverable?'pointer':'default',...V,...style};
  const hE=e=>{if(onClick||hoverable){e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,.1)';}};
  const hL=e=>{if(onClick||hoverable){e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=V.boxShadow||'';}};
  return<div onClick={onClick} onMouseEnter={hE} onMouseLeave={hL} style={base} {...r}>{children}</div>;
}

function Tg({variant='sky',size='sm',children,style={},...r}) {
  const V={sky:{background:'#e7f8fd',color:'#157ba0',border:'1px solid #c4eef9'},primary:{background:'#eef0fa',color:'#1a278a',border:'1px solid #d5daf4'},default:{background:'#e8e8ed',color:'#48484a',border:'1px solid #d2d2d7'}}[variant]||{};
  return<span style={{display:'inline-flex',alignItems:'center',fontFamily:'DM Sans,system-ui,sans-serif',fontWeight:500,whiteSpace:'nowrap',lineHeight:1,borderRadius:8,fontSize:size==='sm'?'11px':'13px',padding:size==='sm'?'.25rem .625rem':'.3rem .875rem',...V,...style}} {...r}>{children}</span>;
}

/* ── Scroll fade wrapper ────────────────────────────────── */

function FadeIn({delay=0,children,style:extra={}}) {
  const ref=React.useRef(null);
  const [vis,setVis]=React.useState(false);
  React.useEffect(()=>{
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true);},{threshold:.1});
    if(ref.current)o.observe(ref.current);
    return()=>o.disconnect();
  },[]);
  return<div ref={ref} style={{opacity:vis?1:0,transform:vis?'none':'translateY(28px)',transition:`opacity .65s ${delay}ms ease,transform .65s ${delay}ms ease`,...extra}}>{children}</div>;
}

/* ── Nav ────────────────────────────────────────────────── */

function Nav({scrolled}) {
  return<nav style={{position:'fixed',top:0,left:0,right:0,zIndex:1000,height:64,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 48px',background:scrolled?'rgba(255,255,255,.88)':'transparent',backdropFilter:scrolled?'blur(20px) saturate(180%)':'none',WebkitBackdropFilter:scrolled?'blur(20px) saturate(180%)':'none',borderBottom:scrolled?'1px solid rgba(0,0,0,.06)':'none',transition:'all .35s ease'}}>
    <img src="../../assets/logo.png" alt="Pure Water Automations" style={{height:36}}/>
    <div style={{display:'flex',alignItems:'center',gap:36}}>
      {['Services','How It Works','About','Contact'].map(link=>(
        <a key={link} style={{fontSize:15,fontFamily:'DM Sans,system-ui,sans-serif',fontWeight:500,color:'#1d1d1f',transition:'opacity .15s'}}
          onMouseEnter={e=>e.currentTarget.style.opacity='.55'} onMouseLeave={e=>e.currentTarget.style.opacity='1'}>{link}</a>
      ))}
      <Btn sz="sm">Get Started</Btn>
    </div>
  </nav>;
}

/* ── Hero ───────────────────────────────────────────────── */

function Hero() {
  return<section style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden',background:'#fff',paddingTop:80}}>
    <div style={{position:'absolute',width:800,height:800,borderRadius:'50%',background:'radial-gradient(circle,rgba(77,196,232,.13) 0%,transparent 65%)',top:-200,right:-150,animation:'pwa-float 10s ease-in-out infinite',pointerEvents:'none'}}/>
    <div style={{position:'absolute',width:500,height:500,borderRadius:'50%',background:'radial-gradient(circle,rgba(19,34,114,.06) 0%,transparent 70%)',bottom:-80,left:'6%',animation:'pwa-float 14s ease-in-out infinite reverse',pointerEvents:'none'}}/>
    <div style={{textAlign:'center',maxWidth:840,padding:'0 48px',position:'relative',zIndex:1}}>
      <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'#e7f8fd',border:'1px solid #c4eef9',borderRadius:100,padding:'5px 16px',marginBottom:32}}>
        <span style={{width:6,height:6,borderRadius:'50%',background:'#4dc4e8',display:'block',animation:'pwa-pulse-glow 2s ease-in-out infinite'}}/>
        <span style={{fontSize:13,fontFamily:'DM Sans,system-ui,sans-serif',fontWeight:500,color:'#157ba0',letterSpacing:'.01em'}}>Operations support for mission-driven leaders</span>
      </div>
      <h1 style={{fontFamily:'Outfit,system-ui,sans-serif',fontSize:'clamp(52px,7.5vw,88px)',fontWeight:800,lineHeight:1.0,letterSpacing:'-.04em',color:'#132272',margin:'0 0 24px'}}>
        Refreshing leaders.<br/><span style={{color:'#4dc4e8'}}>Removing burdens.</span>
      </h1>
      <p style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:19,color:'#6e6e73',lineHeight:1.65,maxWidth:560,margin:'0 auto 44px'}}>
        Pure Water Automations helps pastors, ministry leaders, and mission-driven organizations remove administrative burden — so they can focus fully on their calling.
      </p>
      <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
        <Btn sz="lg">Get Your Systems Organized</Btn>
        <Btn v="ghost" sz="lg" iconRight={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>}>See How It Works</Btn>
      </div>
      <div style={{marginTop:72,paddingTop:40,borderTop:'1px solid #e8e8ed',display:'flex',justifyContent:'center'}}>
        {[['100%','Mission-Focused'],['Built on','Notion + Drive'],['Human +','AI Support'],['June','2025 Founded']].map(([val,lbl],i)=>(
          <div key={i} style={{padding:'0 36px',borderRight:i<3?'1px solid #d2d2d7':'none',textAlign:'center'}}>
            <div style={{fontFamily:'Outfit,system-ui,sans-serif',fontSize:32,fontWeight:700,letterSpacing:'-.02em',color:'#132272'}}>{val}</div>
            <div style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:13,color:'#6e6e73',marginTop:4}}>{lbl}</div>
          </div>
        ))}
      </div>
    </div>
    <div style={{position:'absolute',bottom:32}}>
      <svg width="22" height="34" viewBox="0 0 22 34" fill="none">
        <rect x="1" y="1" width="20" height="32" rx="10" stroke="#d2d2d7" strokeWidth="1.5"/>
        <circle cx="11" cy="10" r="3" fill="#4dc4e8">
          <animate attributeName="cy" values="10;20;10" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>
  </section>;
}

/* ── Features ───────────────────────────────────────────── */

const FEATS=[
  {title:'Systems & Organization',desc:'We build your operating hub in Notion — client records, project tracking, SOPs, and decision logs — so your organization runs on one clear source of truth.',icon:<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>},
  {title:'Virtual Assistant Support',desc:'Trained VAs handle the administrative load — scheduling, follow-up, inbox management, meeting notes, and task coordination — so your leaders stay in their lane.',icon:<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>},
  {title:'Workflow Automation',desc:'Reduce repetitive manual work with practical automations — from onboarding sequences to reporting pipelines — leaving more time for mission-critical work.',icon:<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>},
];

function Features() {
  return<section style={{background:'#f5f5f7',padding:'100px 48px'}}>
    <div style={{maxWidth:1120,margin:'0 auto'}}>
      <div style={{textAlign:'center',marginBottom:60}}>
        <Tg style={{marginBottom:16}}>Platform Features</Tg>
        <h2 style={{fontFamily:'Outfit,system-ui,sans-serif',fontSize:'clamp(36px,4vw,52px)',fontWeight:700,letterSpacing:'-.03em',color:'#132272',lineHeight:1.1,margin:'12px 0 16px'}}>How PWA serves your organization</h2>
        <p style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:17,color:'#6e6e73',maxWidth:480,margin:'0 auto',lineHeight:1.6}}>Practical support built for leaders with too much admin and not enough time.</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20}}>
        {FEATS.map((f,i)=>(
          <FadeIn key={i} delay={i*80}>
            <Crd hoverable style={{height:'100%'}}>
              <div style={{width:52,height:52,borderRadius:14,background:'#e7f8fd',display:'flex',alignItems:'center',justifyContent:'center',color:'#2ab0d8',marginBottom:20}}>{f.icon}</div>
              <h3 style={{fontFamily:'Outfit,system-ui,sans-serif',fontSize:20,fontWeight:600,letterSpacing:'-.01em',color:'#132272',margin:'0 0 10px'}}>{f.title}</h3>
              <p style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:15,color:'#6e6e73',lineHeight:1.65,margin:0}}>{f.desc}</p>
            </Crd>
          </FadeIn>
        ))}
      </div>
    </div>
  </section>;
}

/* ── Numbers ────────────────────────────────────────────── */

const NUMS=[
  {val:'Notion',lbl:'Single Source of Truth',sub:'All operations in one place'},
  {val:'Human',lbl:'VAs + AI Together',sub:'People-first, tech-assisted'},
  {val:'Every',lbl:'Engagement Leaves a System',sub:'SOPs, templates, and clarity'},
  {val:'2025',lbl:'Founded with Purpose',sub:'Justin Okamoto & Eunmi Rangala'},
];

function Numbers() {
  return<section style={{background:'#132272',padding:'100px 48px'}}>
    <div style={{maxWidth:1120,margin:'0 auto',display:'grid',gridTemplateColumns:'repeat(4,1fr)'}}>
      {NUMS.map((n,i)=>(
        <FadeIn key={i} delay={i*80} style={{padding:'0 32px',borderRight:i<3?'1px solid rgba(255,255,255,.1)':'none',textAlign:'center'}}>
          <div style={{fontFamily:'Outfit,system-ui,sans-serif',fontSize:'clamp(40px,4.5vw,60px)',fontWeight:800,letterSpacing:'-.04em',color:'#4dc4e8',lineHeight:1,marginBottom:12}}>{n.val}</div>
          <div style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:16,fontWeight:600,color:'#fff',marginBottom:6}}>{n.lbl}</div>
          <div style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:13,color:'rgba(255,255,255,.45)'}}>{n.sub}</div>
        </FadeIn>
      ))}
    </div>
  </section>;
}

/* ── CTA ────────────────────────────────────────────────── */

function CTA() {
  return<section style={{background:'#fff',padding:'100px 48px'}}>
    <FadeIn style={{maxWidth:680,margin:'0 auto',textAlign:'center'}}>
      <h2 style={{fontFamily:'Outfit,system-ui,sans-serif',fontSize:'clamp(36px,4vw,52px)',fontWeight:800,letterSpacing:'-.035em',lineHeight:1.1,color:'#132272',margin:'0 0 20px'}}>Ready to free up your leadership?</h2>
      <p style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:17,color:'#6e6e73',lineHeight:1.65,margin:'0 0 40px'}}>PWA helps you delegate, clarify workflows, and build systems that keep your mission moving — without burning out your team.</p>
      <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
        <Btn sz="lg">Get Your Systems Organized</Btn>
        <Btn v="ghost" sz="lg">Talk to Our Team</Btn>
      </div>
    </FadeIn>
  </section>;
}

/* ── Footer ─────────────────────────────────────────────── */

function Footer() {
  return<footer style={{background:'#f5f5f7',borderTop:'1px solid #d2d2d7',padding:'36px 48px'}}>
    <div style={{maxWidth:1120,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <img src="../../assets/logo.png" alt="PWA" style={{height:30}}/>
      <span style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:13,color:'#98989d'}}>© 2026 Pure Water Automations. All rights reserved.</span>
      <div style={{display:'flex',gap:24}}>
        {['Privacy','Terms','Contact'].map(l=>(
          <a key={l} style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:13,color:'#6e6e73',transition:'opacity .15s'}}
            onMouseEnter={e=>e.currentTarget.style.opacity='.55'} onMouseLeave={e=>e.currentTarget.style.opacity='1'}>{l}</a>
        ))}
      </div>
    </div>
  </footer>;
}

/* ── App Root ───────────────────────────────────────────── */

function App() {
  const [scrolled,setScrolled]=React.useState(false);
  React.useEffect(()=>{
    const h=()=>setScrolled(window.scrollY>40);
    window.addEventListener('scroll',h,{passive:true});
    return()=>window.removeEventListener('scroll',h);
  },[]);
  return<div>
    <Nav scrolled={scrolled}/>
    <Hero/>
    <Features/>
    <Numbers/>
    <CTA/>
    <Footer/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
