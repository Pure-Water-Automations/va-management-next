  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html,body{margin:0;padding:0;height:100%;overflow:hidden;}

    *{box-sizing:border-box;}
    ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:#d2d2d7;border-radius:4px;}
    @keyframes pwa-spin{to{transform:rotate(360deg);}}
    @keyframes pwa-pulse-glow{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.2)}}
  </style>
</head>
<body>
  <div id="root" style="height:100vh"></div>
  <script type="text/babel">

/* ── Inline Components ─────────────────────────────────── */

function Btn({v='primary',sz='md',disabled=false,loading=false,icon,iconRight,onClick,type='button',fw,children,style={},...r}) {
  const S={xs:{h:'28px',p:'0 10px',fs:'11px',g:'4px'},sm:{h:'34px',p:'0 16px',fs:'13px',g:'6px'},md:{h:'42px',p:'0 20px',fs:'15px',g:'8px'},lg:{h:'52px',p:'0 28px',fs:'17px',g:'10px'}}[sz]||{};
  const V={primary:{background:'linear-gradient(180deg,#1a278a,#132272)',color:'#fff',border:'1px solid rgba(255,255,255,.08)',boxShadow:'0 4px 12px rgba(19,34,114,.2)'},secondary:{background:'linear-gradient(180deg,#4dc4e8,#2ab0d8)',color:'#fff',border:'1px solid rgba(255,255,255,.15)',boxShadow:'0 4px 12px rgba(77,196,232,.25)'},ghost:{background:'transparent',color:'#132272',border:'1px solid #d2d2d7',boxShadow:'0 1px 2px rgba(0,0,0,.04)'},danger:{background:'linear-gradient(180deg,#f26060,#f04c4c)',color:'#fff',border:'none',boxShadow:'0 4px 12px rgba(240,76,76,.25)'},text:{background:'transparent',color:'#1a278a',border:'none',boxShadow:'none'},outline:{background:'transparent',color:'#132272',border:'1.5px solid #132272',boxShadow:'none'}}[v]||{};
  const base={display:'inline-flex',alignItems:'center',justifyContent:'center',gap:S.g,borderRadius:'9999px',fontFamily:'DM Sans,system-ui,sans-serif',fontWeight:500,letterSpacing:'-.01em',cursor:disabled?'not-allowed':'pointer',outline:'none',textDecoration:'none',whiteSpace:'nowrap',userSelect:'none',transition:'transform .24s cubic-bezier(.34,1.56,.64,1),box-shadow .24s ease',width:fw?'100%':undefined,opacity:disabled?.45:1,height:S.h,padding:S.p,fontSize:S.fs,flexShrink:0,...V,...style};
  const hE=e=>{if(!disabled)e.currentTarget.style.transform='translateY(-1px) scale(1.015)';};
  const hL=e=>{e.currentTarget.style.transform='';};
  const hD=e=>{if(!disabled)e.currentTarget.style.transform='scale(.97)';};
  return <button type={type} disabled={disabled} onClick={onClick} style={base} onMouseEnter={hE} onMouseLeave={hL} onMouseDown={hD} {...r}>
    {loading?<svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{animation:'pwa-spin .7s linear infinite'}}><circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="2.5" strokeOpacity=".25"/><path d="M12 3a9 9 0 019 9" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>:icon?<span style={{display:'flex'}}>{icon}</span>:null}
    {children}
    {!loading&&iconRight&&<span style={{display:'flex'}}>{iconRight}</span>}
  </button>;
}

function Crd({variant='default',padding=24,radius=24,hoverable,onClick,children,style={},...r}) {
  const V={default:{background:'#fff',border:'1px solid #d2d2d7',boxShadow:'0 1px 3px rgba(0,0,0,.08)'},navy:{background:'linear-gradient(145deg,#1a278a,#132272)',border:'1px solid rgba(255,255,255,.1)',boxShadow:'0 8px 24px rgba(19,34,114,.22)',color:'#fff'},flat:{background:'#f5f5f7',border:'none',boxShadow:'none'}}[variant]||{};
  const base={borderRadius:radius,padding,transition:'transform .24s cubic-bezier(.34,1.56,.64,1),box-shadow .24s ease',cursor:onClick||hoverable?'pointer':'default',...V,...style};
  return <div onClick={onClick} style={base} {...r}>{children}</div>;
}

function Bdg({variant='default',size='md',dot=false,pulse=false,children,style={},...r}) {
  const V={default:{background:'#e8e8ed',color:'#48484a',border:'1px solid #d2d2d7'},primary:{background:'#eef0fa',color:'#1a278a',border:'1px solid #d5daf4'},sky:{background:'#e7f8fd',color:'#157ba0',border:'1px solid #c4eef9'},success:{background:'#d4f5e2',color:'#1a7a4a',border:'1px solid rgba(48,201,122,.22)'},warning:{background:'#fff3d4',color:'#966200',border:'1px solid rgba(255,179,64,.28)'},danger:{background:'#fde8e8',color:'#a01a1a',border:'1px solid rgba(240,76,76,.22)'},info:{background:'#dff0fc',color:'#0d5e7e',border:'1px solid rgba(77,196,232,.25)'},solid:{background:'#132272',color:'#fff',border:'none'}}[variant]||{};
  const SZ={sm:{fontSize:'10px',padding:'0 7px',height:'18px',gap:'4px'},md:{fontSize:'12px',padding:'0 9px',height:'22px',gap:'5px'},lg:{fontSize:'14px',padding:'0 11px',height:'28px',gap:'7px'}}[size]||{};
  const dotC={success:'#30c97a',danger:'#f04c4c',warning:'#ffb340',primary:'#22359e',sky:'#2ab0d8',info:'#2ab0d8'}[variant]||'#98989d';
  return <><span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',borderRadius:'9999px',fontFamily:'DM Sans,system-ui,sans-serif',fontWeight:500,letterSpacing:'.01em',whiteSpace:'nowrap',lineHeight:1,...SZ,...V,...style}} {...r}>
    {dot&&<span style={{width:size==='sm'?5:6,height:size==='sm'?5:6,flexShrink:0,borderRadius:'50%',background:dotC,display:'inline-block',animation:pulse?'pwa-pulse-glow 1.8s ease-in-out infinite':'none'}}/>}
    {children}
  </span></>;
}

function StatCard({label,value,unit,change,changeLabel,trend='neutral',icon,variant='default',style={}}) {
  const dark=variant==='navy'||variant==='sky';
  const tBg={up:'#d4f5e2',down:'#fde8e8',neutral:'#e8e8ed'}[trend];
  const tC={up:'#1a7a4a',down:'#a01a1a',neutral:'#6e6e73'}[trend];
  const vS=variant==='navy'?{background:'linear-gradient(145deg,#1a278a,#132272)',border:'1px solid rgba(255,255,255,.1)',boxShadow:'0 8px 24px rgba(19,34,114,.22)'}:{background:'#fff',border:'1px solid #d2d2d7',boxShadow:'0 1px 3px rgba(0,0,0,.08)'};
  return <div style={{borderRadius:24,padding:24,display:'flex',flexDirection:'column',gap:12,...vS,...style}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <span style={{fontSize:13,fontFamily:'DM Sans,system-ui,sans-serif',fontWeight:500,letterSpacing:'.01em',color:dark?'rgba(255,255,255,.7)':'#6e6e73'}}>{label}</span>
      {icon&&<span style={{display:'flex',alignItems:'center',justifyContent:'center',width:36,height:36,borderRadius:12,background:dark?'rgba(255,255,255,.14)':'#e7f8fd',color:dark?'rgba(255,255,255,.9)':'#2ab0d8',flexShrink:0}}>{icon}</span>}
    </div>
    <div style={{display:'flex',alignItems:'baseline',gap:6}}>
      <span style={{fontSize:36,fontFamily:'Outfit,system-ui,sans-serif',fontWeight:700,letterSpacing:'-.02em',lineHeight:1,color:dark?'#fff':'#1d1d1f'}}>{value}</span>
      {unit&&<span style={{fontSize:18,fontFamily:'DM Sans,system-ui,sans-serif',fontWeight:500,color:dark?'rgba(255,255,255,.55)':'#6e6e73'}}>{unit}</span>}
    </div>
    {(change!==undefined||changeLabel)&&<div style={{display:'flex',alignItems:'center',gap:8}}>
      {change!==undefined&&<span style={{display:'inline-flex',alignItems:'center',gap:3,background:dark?'rgba(255,255,255,.15)':tBg,color:dark?'rgba(255,255,255,.9)':tC,padding:'2px 8px',borderRadius:'9999px',fontSize:11,fontWeight:600,fontFamily:'DM Sans,system-ui,sans-serif'}}>{change}</span>}
      {changeLabel&&<span style={{fontSize:11,fontFamily:'DM Sans,system-ui,sans-serif',color:dark?'rgba(255,255,255,.45)':'#98989d'}}>{changeLabel}</span>}
    </div>}
  </div>;
}

function Sw({checked=false,onChange,disabled=false,label,hint,size='md'}) {
  const D={sm:{tw:30,th:18,ts:14,off:2,on:14},md:{tw:44,th:26,ts:20,off:3,on:21}}[size]||{};
  return <div style={{display:'inline-flex',alignItems:'center',gap:12,cursor:disabled?'not-allowed':'pointer',userSelect:'none'}}>
    <div style={{position:'relative',width:D.tw,height:D.th,borderRadius:'9999px',background:checked?'linear-gradient(135deg,#4dc4e8,#2ab0d8)':'#b5b5bb',transition:'background .24s ease',flexShrink:0,opacity:disabled?.5:1,boxShadow:checked?'0 4px 12px rgba(77,196,232,.22)':'inset 0 1px 3px rgba(0,0,0,.08)',outline:'none',border:'none',cursor:disabled?'not-allowed':'pointer'}}
      onClick={()=>{if(!disabled)onChange&&onChange(!checked);}} role="switch" aria-checked={checked}>
      <div style={{position:'absolute',width:D.ts,height:D.ts,borderRadius:'50%',background:'#fff',top:D.off,left:checked?D.on:D.off,transition:'left .24s cubic-bezier(.34,1.56,.64,1)',boxShadow:'0 1px 4px rgba(0,0,0,.22)',pointerEvents:'none'}}/>
    </div>
    {(label||hint)&&<div style={{display:'flex',flexDirection:'column',gap:2}}>
      {label&&<span style={{fontSize:13,fontFamily:'DM Sans,system-ui,sans-serif',fontWeight:500,color:'#1d1d1f',lineHeight:1.2}}>{label}</span>}
      {hint&&<span style={{fontSize:11,fontFamily:'DM Sans,system-ui,sans-serif',color:'#6e6e73',lineHeight:1.3}}>{hint}</span>}
    </div>}
  </div>;
}

  {id:'clients',  l:'Clients',   b:null, ico:<><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></>},
  {id:'projects', l:'Projects',  b:null, ico:<><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>},
  {id:'tasks',    l:'Tasks',     b:'3',  ico:<><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></>},
  {id:'settings', l:'Settings',  b:null, ico:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></>},
];

/* ── Sidebar ───────────────────────────────────────────── */

function Sidebar({active,setActive}) {
  return <aside style={{width:240,height:'100vh',position:'fixed',left:0,top:0,background:'#132272',display:'flex',flexDirection:'column',zIndex:20}}>
    <div style={{padding:'22px 20px 18px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
      <img src="../../assets/logo.png" alt="PWA" style={{height:30,filter:'brightness(0) invert(1)'}}/>
    </div>
    <nav style={{flex:1,padding:'12px 10px',display:'flex',flexDirection:'column',gap:2,overflowY:'auto'}}>
      {NAV.map(item=>{
        const isA=active===item.id;
        return <button key={item.id} onClick={()=>setActive(item.id)}
          style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:10,background:isA?'rgba(255,255,255,.12)':'transparent',border:'none',cursor:'pointer',color:isA?'#fff':'rgba(255,255,255,.5)',fontFamily:'DM Sans,system-ui,sans-serif',fontSize:14,fontWeight:500,transition:'all .15s',width:'100%',textAlign:'left'}}
          onMouseEnter={e=>{if(!isA){e.currentTarget.style.background='rgba(255,255,255,.07)';e.currentTarget.style.color='#fff';}}}
          onMouseLeave={e=>{if(!isA){e.currentTarget.style.background='transparent';e.currentTarget.style.color='rgba(255,255,255,.5)';}}}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{item.ico}</svg>
          <span style={{flex:1}}>{item.l}</span>
          {item.b&&<span style={{background:'#f04c4c',color:'#fff',borderRadius:100,fontSize:10,fontWeight:700,padding:'1px 5px',lineHeight:'14px'}}>{item.b}</span>}
        </button>;
      })}
    </nav>
    <div style={{padding:'14px 18px',borderTop:'1px solid rgba(255,255,255,.08)',display:'flex',alignItems:'center',gap:10}}>
      <div style={{width:32,height:32,borderRadius:'50%',background:'linear-gradient(135deg,#4dc4e8,#2ab0d8)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff',fontFamily:'Outfit,system-ui,sans-serif',flexShrink:0}}>JO</div>
      <div>
        <div style={{fontSize:13,fontWeight:600,color:'#fff',fontFamily:'DM Sans,system-ui,sans-serif',lineHeight:1.2}}>Justin Okamoto</div>
        <div style={{fontSize:11,color:'rgba(255,255,255,.4)',fontFamily:'DM Sans,system-ui,sans-serif'}}>Operations Lead</div>
      </div>
    </div>
  </aside>;
}

/* ── TopBar ────────────────────────────────────────────── */

function TopBar({title}) {

    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <div style={{display:'flex',alignItems:'center',gap:8,background:'#f5f5f7',border:'1px solid #d2d2d7',borderRadius:'9999px',padding:'6px 14px'}}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#98989d" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span style={{fontSize:13,fontFamily:'DM Sans,system-ui,sans-serif',color:'#98989d'}}>Search clients, projects…</span>
      </div>
      <button style={{width:34,height:34,borderRadius:8,background:'#f5f5f7',border:'1px solid #d2d2d7',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative'}}>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6e6e73" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span style={{position:'absolute',top:5,right:5,width:7,height:7,borderRadius:'50%',background:'#f04c4c',border:'1.5px solid #fff'}}/>
      </button>
      <div style={{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#4dc4e8,#2ab0d8)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff',fontFamily:'Outfit,system-ui,sans-serif',cursor:'pointer'}}>JO</div>
    </div>

}

/* ── System Row ────────────────────────────────────────── */

function SysRow({sys,sel,onSel}) {
  const s=ST[sys.st];
  return <div onClick={()=>onSel(sys.id)}
    style={{display:'grid',gridTemplateColumns:'1fr 100px 90px 110px 90px 70px 70px',gap:8,alignItems:'center',padding:'10px 16px',background:sel?'#eef0fa':'transparent',borderBottom:'1px solid #e8e8ed',cursor:'pointer',transition:'background .12s'}}
    onMouseEnter={e=>{if(!sel)e.currentTarget.style.background='#f5f5f7';}}
    onMouseLeave={e=>{if(!sel)e.currentTarget.style.background=sel?'#eef0fa':'transparent';}}>
    <div>
      <div style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:13,fontWeight:600,color:'#1d1d1f',lineHeight:1.3}}>{sys.name}</div>
      <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:10,color:'#98989d',marginTop:1}}>{sys.id} · {sys.loc}</div>
    </div>
    <Bdg variant={s.v} size="sm" dot pulse={s.p}>{s.l}</Bdg>
    <span style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:12,color:'#6e6e73'}}>{sys.q}</span>
    <span style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:12,color:'#6e6e73'}}>{sys.f}</span>
    <span style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:12,color:'#48484a',fontWeight:500}}>{sys.p}</span>
    <span style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:11,color:'#98989d'}}>{sys.t}</span>
    <Btn v="ghost" sz="xs">Open</Btn>
  </div>;
}

}

  const IcoClients=<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>;
  const IcoTasks=<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>;
  const IcoClock=<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>;
  return <div style={{padding:28,display:'flex',flexDirection:'column',gap:20,overflowY:'auto',flex:1}}>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
      <StatCard label="Active Clients"       value="4"  unit="/ 5"    change="+1"  trend="up"      changeLabel="this month"     icon={IcoClients}/>
      <StatCard label="Open Tasks"           value="12" unit="tasks"  change="-3"  trend="up"      changeLabel="vs. last week"  icon={IcoTasks}/>
      <StatCard label="Projects In Progress" value="7"  unit="active" variant="navy"               changeLabel="2 due this week"/>
      <StatCard label="SOPs Completed"       value="23" unit="docs"   trend="neutral" changeLabel="All time"                   icon={IcoClock}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:16,alignItems:'start'}}>
      <Crd padding={0}>
        <div style={{padding:'14px 16px 0',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontFamily:'Outfit,system-ui,sans-serif',fontSize:15,fontWeight:600,color:'#132272'}}>Clients</span>
            <Bdg variant="primary" size="sm">5 Total</Bdg>
          </div>
          <Btn v="secondary" sz="xs">Add Client</Btn>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 100px 90px 110px 90px 70px 70px',gap:8,padding:'7px 16px',background:'#f5f5f7',borderTop:'1px solid #e8e8ed',borderBottom:'1px solid #d2d2d7'}}>
          {['Organization','Status','Service','Focus','Progress','Updated',''].map((h,i)=>(
            <span key={i} style={{fontFamily:'DM Sans,system-ui,sans-serif',fontSize:10,fontWeight:600,color:'#98989d',letterSpacing:'.07em',textTransform:'uppercase'}}>{h}</span>
          ))}
        </div>
        {SYS.map(s=><SysRow key={s.id} sys={s} sel={sel===s.id} onSel={setSel}/>)}
      </Crd>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Crd padding={0}>
          <div style={{padding:'12px 14px',borderBottom:'1px solid #e8e8ed',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontFamily:'Outfit,system-ui,sans-serif',fontSize:14,fontWeight:600,color:'#132272'}}>Recent Activity</span>
            <Bdg variant="danger" size="sm">1 Overdue</Bdg>
          </div>
          {ALRTS.map(a=><AItem key={a.id} a={a}/>)}
          <div style={{padding:'8px 14px'}}>
            <button style={{background:'none',border:'none',cursor:'pointer',fontSize:13,fontFamily:'DM Sans,system-ui,sans-serif',color:'#1e97be',padding:0}}>View all alerts →</button>
          </div>
        </Crd>
        <Crd padding={20}>
          <div style={{fontFamily:'Outfit,system-ui,sans-serif',fontSize:14,fontWeight:600,color:'#132272',marginBottom:14}}>Quick Settings</div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <Sw size="sm" checked={af} onChange={setAf} label="Weekly check-in reminders" hint="Every Monday, 9:00 AM"/>
            <Sw size="sm" checked={ea} onChange={setEa} label="Overdue task alerts" hint="Email · Immediate"/>
          </div>
        </Crd>
      </div>
    </div>
  </div>;
}

/* ── Root App ──────────────────────────────────────────── */

const TITLES={overview:'Operations Overview',clients:'All Clients',projects:'Projects',tasks:'Tasks',settings:'Settings'};

function App() {
  const [active,setActive]=React.useState('overview');
  return <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
    <Sidebar active={active} setActive={setActive}/>
    <div style={{marginLeft:240,flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <TopBar title={TITLES[active]}/>
      <MainContent/>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
