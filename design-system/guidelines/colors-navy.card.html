<!-- @dsCard group="Colors" viewport="700x220" name="Brand — Navy" subtitle="10-stop deep navy scale (#132272 primary)" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; padding: 20px 24px 24px; background: #fff; font-family: 'DM Sans', system-ui, sans-serif; }
    .scale { display: flex; gap: 4px; }
    .chip { flex: 1; height: 56px; border-radius: 10px; display: flex; align-items: flex-end; padding: 6px 7px; }
    .chip-num { font-size: 9px; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1; }
    .row-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-text-tertiary); margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="row-label">Navy scale — primary brand</div>
  <div class="scale">
    <div class="chip" style="background:var(--color-navy-50)">  <span class="chip-num" style="color:#132272">50</span></div>
    <div class="chip" style="background:var(--color-navy-100)"> <span class="chip-num" style="color:#132272">100</span></div>
    <div class="chip" style="background:var(--color-navy-200)"> <span class="chip-num" style="color:#132272">200</span></div>
    <div class="chip" style="background:var(--color-navy-300)"> <span class="chip-num" style="color:#fff">300</span></div>
    <div class="chip" style="background:var(--color-navy-400)"> <span class="chip-num" style="color:#fff">400</span></div>
    <div class="chip" style="background:var(--color-navy-500)"> <span class="chip-num" style="color:#fff">500</span></div>
    <div class="chip" style="background:var(--color-navy-600)"> <span class="chip-num" style="color:#fff">600</span></div>
    <div class="chip" style="background:var(--color-navy-700)"> <span class="chip-num" style="color:#fff">700</span></div>
    <div class="chip" style="background:var(--color-navy-800)"> <span class="chip-num" style="color:#fff">800</span></div>
    <div class="chip" style="background:var(--color-navy-900); outline: 3px solid #4dc4e8; outline-offset: 2px;"> <span class="chip-num" style="color:#fff">900★</span></div>
  </div>
</body>
</html>
