<!-- @dsCard group="Colors" viewport="700x200" name="Semantic Colors" subtitle="Success · Warning · Error · Info — light/main/dark triads" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; padding: 20px 24px 24px; background: #fff; font-family: 'DM Sans', system-ui, sans-serif; display: flex; flex-direction: column; gap: 14px; }
    .row { display: flex; gap: 20px; align-items: center; }
    .group { display: flex; gap: 3px; }
    .chip { width: 44px; height: 36px; border-radius: 8px; }
    .group-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-tertiary); width: 60px; flex-shrink: 0; }
    .sub-label { font-size: 9px; font-family: 'JetBrains Mono', monospace; color: var(--color-text-tertiary); text-align: center; margin-top: 3px; }
    .chip-wrap { display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div class="row">
    <span class="group-label">Success</span>
    <div class="group">
      <div class="chip-wrap"><div class="chip" style="background:var(--color-success-light)"></div><div class="sub-label">light</div></div>
      <div class="chip-wrap"><div class="chip" style="background:var(--color-success)"></div><div class="sub-label">main</div></div>
      <div class="chip-wrap"><div class="chip" style="background:var(--color-success-dark)"></div><div class="sub-label">dark</div></div>
    </div>
    <span class="group-label">Warning</span>
    <div class="group">
      <div class="chip-wrap"><div class="chip" style="background:var(--color-warning-light)"></div><div class="sub-label">light</div></div>
      <div class="chip-wrap"><div class="chip" style="background:var(--color-warning)"></div><div class="sub-label">main</div></div>
      <div class="chip-wrap"><div class="chip" style="background:var(--color-warning-dark)"></div><div class="sub-label">dark</div></div>
    </div>
    <span class="group-label">Error</span>
    <div class="group">
      <div class="chip-wrap"><div class="chip" style="background:var(--color-error-light)"></div><div class="sub-label">light</div></div>
      <div class="chip-wrap"><div class="chip" style="background:var(--color-error)"></div><div class="sub-label">main</div></div>
      <div class="chip-wrap"><div class="chip" style="background:var(--color-error-dark)"></div><div class="sub-label">dark</div></div>
    </div>
    <span class="group-label">Info</span>
    <div class="group">
      <div class="chip-wrap"><div class="chip" style="background:var(--color-info-light)"></div><div class="sub-label">light</div></div>
      <div class="chip-wrap"><div class="chip" style="background:var(--color-info)"></div><div class="sub-label">main</div></div>
      <div class="chip-wrap"><div class="chip" style="background:var(--color-info-dark)"></div><div class="sub-label">dark</div></div>
    </div>
  </div>
</body>
</html>
