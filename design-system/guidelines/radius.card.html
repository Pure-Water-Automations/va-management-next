<!-- @dsCard group="Spacing" viewport="700x160" name="Border Radius" subtitle="9-stop scale from 4px to pill — semantic aliases" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; padding: 20px 24px 24px; background: #fff; font-family: 'DM Sans', system-ui, sans-serif; }
    .row { display: flex; gap: 14px; align-items: center; }
    .chip { width: 52px; height: 52px; background: linear-gradient(145deg, var(--color-navy-800), var(--color-navy-900)); }
    .lbl { font-size: 9px; font-family: 'JetBrains Mono', monospace; color: var(--color-text-tertiary); margin-top: 6px; text-align: center; }
    .wrap { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
  <div class="row">
    <div class="wrap"><div class="chip" style="border-radius:var(--radius-xs)"></div>  <div class="lbl">xs · 4px</div></div>
    <div class="wrap"><div class="chip" style="border-radius:var(--radius-sm)"></div>  <div class="lbl">sm · 8px</div></div>
    <div class="wrap"><div class="chip" style="border-radius:var(--radius-md)"></div>  <div class="lbl">md · 12px</div></div>
    <div class="wrap"><div class="chip" style="border-radius:var(--radius-lg)"></div>  <div class="lbl">lg · 16px</div></div>
    <div class="wrap"><div class="chip" style="border-radius:var(--radius-xl)"></div>  <div class="lbl">xl · 20px</div></div>
    <div class="wrap"><div class="chip" style="border-radius:var(--radius-2xl)"></div> <div class="lbl">2xl · 24px<br>★ card</div></div>
    <div class="wrap"><div class="chip" style="border-radius:var(--radius-3xl)"></div> <div class="lbl">3xl · 32px</div></div>
    <div class="wrap"><div class="chip" style="border-radius:var(--radius-full);width:52px"></div><div class="lbl">full<br>★ button</div></div>
  </div>
</body>
</html>
