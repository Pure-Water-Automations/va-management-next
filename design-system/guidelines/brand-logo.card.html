<!-- @dsCard group="Brand" viewport="700x220" name="Logo" subtitle="Official PWA mark on white, navy, and gray backgrounds" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; padding: 0; background: #fff; display: flex; font-family: 'DM Sans', system-ui, sans-serif; }
    .panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 20px; }
    .panel img { width: 140px; height: auto; }
    .lbl { position: absolute; bottom: 10px; font-size: 9px; font-family: 'JetBrains Mono', monospace; opacity: 0.5; letter-spacing: 0.08em; }
    .panel { position: relative; }
  </style>
</head>
<body>
  <div class="panel" style="background:#ffffff; border-right: 1px solid var(--color-border)">
    <img src="../assets/logo.png" alt="PWA Logo">
    <span class="lbl" style="color:#132272">White #FFFFFF</span>
  </div>
  <div class="panel" style="background:var(--color-navy-900);">
    <img src="../assets/logo.png" alt="PWA Logo" style="filter: brightness(0) invert(1) sepia(1) saturate(2) hue-rotate(185deg) brightness(1.5)">
    <span class="lbl" style="color:rgba(255,255,255,0.5)">Navy #132272</span>
  </div>
  <div class="panel" style="background:var(--color-neutral-50); border-left: 1px solid var(--color-border)">
    <img src="../assets/logo.png" alt="PWA Logo">
    <span class="lbl" style="color:#6e6e73">Off-white #F5F5F7</span>
  </div>
</body>
</html>
