<!-- @dsCard group="Components" viewport="700x300" name="Data — Stat" subtitle="KPI metric cards — default · navy · sky variants with trend" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <style> body { margin: 0; padding: 20px 24px; background: #f5f5f7; } </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Stat } = window.PWADesignSystem_9304be;

    const DropletIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 2C6 9 4 13 4 15a8 8 0 0016 0c0-2-2-6-8-13z"/>
      </svg>
    );
    const ActivityIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    );
    const GaugeIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10"/>
        <path d="M12 12l4.5-4.5"/>
        <circle cx="12" cy="12" r="1.5"/>
      </svg>
    );

    function Showcase() {
      return (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14 }}>
          <Stat label="Water Quality Index" value="98.4" unit="%" change="+1.2%" trend="up" changeLabel="vs. yesterday" icon={<DropletIcon />} />
          <Stat label="Flow Rate" value="12.4" unit="L/min" change="-0.3" trend="down" changeLabel="vs. last hour" icon={<ActivityIcon />} />
          <Stat label="System Pressure" value="2.8" unit="bar" trend="neutral" changeLabel="Within spec" icon={<GaugeIcon />} />
          <Stat variant="navy" label="Uptime" value="99.8" unit="%" change="+0.1%" trend="up" changeLabel="30-day avg" />
          <Stat variant="sky" label="Active Systems" value="7" changeLabel="All operational" />
          <Stat label="pH Level" value="7.2" change="+0.1" trend="neutral" changeLabel="Target 7.0–7.4" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Showcase />);
  </script>
</body>
</html>
